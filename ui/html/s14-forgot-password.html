<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#fbf8f4">
    <title>KATA | Forgot Password</title>
    <link rel="stylesheet" href="../style/common.css?v=10">
  </head>
  <body class="kata-page forgot-pin-page">
    <main class="app-shell">
      <section class="forgot-pin-screen" aria-labelledby="page-title">
        <header class="journey-header forgot-pin-header">
          <a class="back-button" href="s13-enter-password.html" aria-label="Back to sign in"><img class="header-icon" src="../style/icons/icon-back.png" alt=""></a>
          <div><h1 id="page-title">Forgot Password</h1><p data-reset-subtitle>Verify your profile details to reset your PIN</p></div>
          <span aria-hidden="true"></span>
        </header>

        <ol class="reset-progress" aria-label="Password reset progress" data-reset-progress>
          <li class="active"><span>1</span><strong>Verify Profile</strong></li><li><span>2</span><strong>Change PIN</strong></li><li><span>3</span><strong>Complete</strong></li>
        </ol>

        <form class="forgot-pin-form" data-forgot-pin-form novalidate>
          <section class="verify-notice"><span class="pin-info-icon" aria-hidden="true">i</span><p>Enter the details you provided during<br>“Before You Begin”.</p></section>

          <div class="reset-field"><label for="reset-gender">Gender</label><select id="reset-gender" name="gender" autocomplete="sex"><option value="" selected disabled>Select gender</option><option value="Woman">Woman</option><option value="Man">Man</option><option value="Non-binary">Non-binary</option><option value="Prefer not to say">Prefer not to say</option><option value="Self-describe">Self-describe</option></select></div>
          <div class="reset-field"><label for="reset-birth-month">Birth month</label><select id="reset-birth-month" name="birthMonth" autocomplete="bday-month"><option value="" selected disabled>Select month</option><option value="January">January</option><option value="February">February</option><option value="March">March</option><option value="April">April</option><option value="May">May</option><option value="June">June</option><option value="July">July</option><option value="August">August</option><option value="September">September</option><option value="October">October</option><option value="November">November</option><option value="December">December</option></select></div>
          <div class="reset-field"><label for="reset-birth-year">Birth year</label><input id="reset-birth-year" name="birthYear" type="number" inputmode="numeric" autocomplete="bday-year" min="1900" max="2026" step="1" placeholder="YYYY"></div>
          <p class="forgot-pin-message" data-forgot-pin-message aria-live="polite"></p>
          <button class="reset-verify-button" type="submit">Verify Details</button>
          <div class="reset-or" aria-hidden="true">or</div>
          <a class="reset-cancel-button" href="s13-enter-password.html">Cancel</a>
        </form>

        <section class="reset-complete" data-reset-complete hidden aria-labelledby="reset-complete-title">
          <div class="reset-complete-check" aria-hidden="true">✓</div><h2 id="reset-complete-title">PIN updated</h2><p>Your new PIN is ready to use.</p><a class="reset-verify-button" href="s13-enter-password.html">Return to sign in</a>
        </section>

        <nav class="bottom-nav" aria-label="Primary navigation">
          <a class="nav-link" href="s02-my-practice.html"><img class="nav-icon-image" src="../style/icons/nav-practice-gray.png" alt=""><span>My Practice</span></a>
          <a class="nav-link" href="s06-my-journey.html"><img class="nav-icon-image" src="../style/icons/nav-journey.png" alt=""><span>My Journey</span></a>
          <a class="nav-link" href="s09-my-kata.html"><img class="nav-icon-image" src="../style/icons/nav-kata-gray.png" alt=""><span>My KATA</span></a>
          <button class="nav-link active more-active nav-more-trigger" type="button" data-bottom-more><img class="nav-icon-image" src="../style/icons/nav-more-blue.png" alt=""><span>More</span></button>
        </nav>
      </section>
    </main>
    <script src="../script/clarity.js?v=3"></script>
    <script src="../script/common.js?v=15"></script>
  </body>
</html>
