<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#fbf8f4">
    <title>KATA | Enter PIN</title>
    <link rel="stylesheet" href="../style/common.css?v=12">
  </head>
  <body class="kata-page enter-pin-page">
    <main class="app-shell">
      <section class="enter-pin-screen" aria-labelledby="page-title">
        <div class="enter-pin-brand"><img src="../style/icons/brand-kata.png" alt="KATA — Master your craft"></div>

        <header class="enter-pin-heading">
          <h1 id="page-title">Welcome back!</h1>
          <p>Enter your 4-digit PIN to continue</p>
        </header>

        <div class="enter-pin-lock" aria-hidden="true"><span></span></div>

        <form class="enter-pin-form" data-enter-pin-form novalidate>
          <div class="pin-inputs enter-pin-inputs" aria-label="Four digit PIN">
            <input type="password" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="current-password" aria-label="PIN digit 1" data-enter-pin-input autofocus>
            <input type="password" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="current-password" aria-label="PIN digit 2" data-enter-pin-input>
            <input type="password" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="current-password" aria-label="PIN digit 3" data-enter-pin-input>
            <input type="password" inputmode="numeric" pattern="[0-9]*" maxlength="1" autocomplete="current-password" aria-label="PIN digit 4" data-enter-pin-input>
          </div>
          <p class="enter-pin-message" data-enter-pin-message aria-live="polite"></p>
        </form>

        <section class="forgot-pin" aria-label="Forgot PIN help">
          <h2><a href="s14-forgot-password.html">Forgot PIN?</a></h2>
          <p>Verify your profile details to<br>reset your PIN.</p>
        </section>

      </section>
    </main>
    <script src="../script/clarity.js?v=3"></script>
    <script src="../script/common.js?v=17"></script>
  </body>
</html>
